<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stoker UI Pack Preview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <img src="../assets/png/app-icon/stoker-app-icon-1024.png" alt="Stoker app icon">
      <div>
        <h1>Stoker</h1>
        <p>A quiet macOS utility that tends AI usage windows, quota signals, and scheduled READY check-ins.</p>
      </div>
    </section>
    <section class="grid">
      <div class="card">
        <h2>Palette</h2>
        <div class="swatches"><div class="swatch" title="graphite" style="background:#171716"></div>
<div class="swatch" title="ember" style="background:#E36E43"></div>
<div class="swatch" title="copper" style="background:#B97A54"></div>
<div class="swatch" title="ivory" style="background:#F3EEE6"></div>
<div class="swatch" title="ash" style="background:#D6D0C7"></div>
<div class="swatch" title="sage" style="background:#9EB392"></div>
<div class="swatch" title="mist" style="background:#EAF0E9"></div>
<div class="swatch" title="ok" style="background:#43B86C"></div>
<div class="swatch" title="warn" style="background:#D89D38"></div>
<div class="swatch" title="danger" style="background:#DC5B54"></div></div>
      </div>
      <div class="card">
        <h2>Option Cues</h2>
        <div class="icons"><img src="../assets/png/cue/cue-schedule.png" alt="cue-schedule">
<img src="../assets/png/cue/cue-quota.png" alt="cue-quota">
<img src="../assets/png/cue/cue-tools.png" alt="cue-tools">
<img src="../assets/png/cue/cue-keep-awake.png" alt="cue-keep-awake">
<img src="../assets/png/cue/cue-run-now.png" alt="cue-run-now">
<img src="../assets/png/cue/cue-logs.png" alt="cue-logs">
<img src="../assets/png/cue/cue-export.png" alt="cue-export">
<img src="../assets/png/cue/cue-settings.png" alt="cue-settings">
<img src="../assets/png/cue/cue-language.png" alt="cue-language"></div>
      </div>
      <div class="card">
        <h2>Status</h2>
        <div class="icons"><img src="../assets/png/status/status-active.png" alt="active">
<img src="../assets/png/status/status-paused.png" alt="paused">
<img src="../assets/png/status/status-warning.png" alt="warning">
<img src="../assets/png/status/status-error.png" alt="error"></div>
      </div>
      <div class="card wide">
        <h2>Main Window Direction</h2>
        <img class="mockup" src="../assets/mockups/stoker-main-window-concept.png" alt="Stoker main window concept">
      </div>
    </section>
  </main>
</body>
</html>
